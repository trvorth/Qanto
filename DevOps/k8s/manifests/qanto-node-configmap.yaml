apiVersion: v1
kind: ConfigMap
metadata:
  name: qanto-node-config
  namespace: qanto
  labels:
    app: qanto-node
    component: config
data:
  config.toml: |
    p2p_address = "/ip4/0.0.0.0/tcp/30303/ws"
    api_address = "0.0.0.0:8081"
    peers = [
      "/dns4/bootnode-1.qanto.network/tcp/30303/ws/p2p/12D3KooWBootnode1",
      "/dns4/bootnode-2.qanto.network/tcp/30303/ws/p2p/12D3KooWBootnode2"
    ]
    local_full_p2p_address = ""
    network_id = "qanto-mainnet"
    chain_id = 1234
    genesis_validator = "ae527b01ffcb3baae0106fbb954acd184e02cb379a3319ff66d3cdfb4a63f9d3"
    contract_address = "4a8d50f24c5ffec79ac665d123a3bdecacaa95f9f26751385a5a925c647bd394"
    target_block_time = 1000
    difficulty = 1
    max_amount = 21000000000
    use_gpu = false
    zk_enabled = true
    mining_threads = 4
    mining_enabled = true
    adaptive_mining_enabled = false
    num_chains = 1
    mining_chain_id = 0
    mining_interval_ms = 1000
    dummy_tx_interval_ms = 250
    dummy_tx_per_cycle = 10
    mempool_max_age_secs = 3600
    mempool_max_size_bytes = 67108864
    mempool_max_size = 100000
    mempool_batch_size = 1000
    mempool_backpressure_threshold = 800000000
    tx_batch_size = 500
    adaptive_batch_threshold = 700000000
    memory_soft_limit = 8388608
    memory_hard_limit = 10485760
    dev_fee_rate = 100000000
    data_dir = "/data"
    db_path = "/data/qanto.db"
    wallet_path = "/data/wallet.key"
    p2p_identity_path = "/data/p2p_identity.key"
    log_file_path = "/data/logs/qanto.log"

    [rpc]
    address = "0.0.0.0:50051"

    [logging]
    level = "info"
    enable_block_celebrations = false
    celebration_log_level = "info"

    [p2p]
    heartbeat_interval = 2000
    mesh_n_low = 2
    mesh_n = 4
    mesh_n_high = 8
    mesh_outbound_min = 2

    [mempool]
    parallel_verification_threads = 4
    capacity = 100000

  genesis.json: |
    {
      "name": "Qanto Mainnet",
      "id": "qanto-mainnet",
      "chainType": "Live",
      "bootNodes": [
        "/dns4/bootnode-1.qanto.network/tcp/30303/ws/p2p/12D3KooWBootnode1",
        "/dns4/bootnode-2.qanto.network/tcp/30303/ws/p2p/12D3KooWBootnode2"
      ],
      "protocolId": "qanto",
      "properties": {
        "tokenDecimals": 9,
        "tokenSymbol": "QNTO",
        "maxSupply": 21000000000,
        "smallestUnitsPerQanto": 1000000000
      }
    }

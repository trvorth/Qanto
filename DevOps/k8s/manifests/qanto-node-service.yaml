apiVersion: v1
kind: Service
metadata:
  name: qanto-node-api
  namespace: qanto
  labels:
    app: qanto-node
    component: api
spec:
  type: LoadBalancer
  ports:
  - name: api
    port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app: qanto-node
---
apiVersion: v1
kind: Service
metadata:
  name: qanto-node-rpc
  namespace: qanto
  labels:
    app: qanto-node
    component: rpc
spec:
  type: ClusterIP
  ports:
  - name: rpc
    port: 50051
    targetPort: 50051
    protocol: TCP
  selector:
    app: qanto-node
---
apiVersion: v1
kind: Service
metadata:
  name: qanto-node-p2p
  namespace: qanto
  labels:
    app: qanto-node
    component: p2p
spec:
  type: LoadBalancer
  ports:
  - name: p2p
    port: 30303
    targetPort: 30303
    protocol: TCP
  selector:
    app: qanto-node

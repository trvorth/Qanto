apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qanto-node.fullname" . }}
  labels:
    {{- include "qanto-node.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "qanto-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "qanto-node.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "qanto-node.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: {{ .Values.service.ports.api }}
              protocol: TCP
            - name: rpc
              containerPort: {{ .Values.service.ports.rpc }}
              protocol: TCP
            - name: p2p
              containerPort: {{ .Values.service.ports.p2p }}
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.config.logLevel }}
            - name: CONFIG_PATH
              value: "/opt/qanto/config/config.toml"
            - name: WALLET_PATH
              value: "/opt/qanto/keys/wallet.key"
            - name: P2P_IDENTITY
              value: "/opt/qanto/keys/p2p_identity.key"
            - name: PEER_CACHE
              value: "/opt/qanto/keys/peer_cache.json"
            - name: WALLET_PASSWORD_FILE
              value: "/run/secrets/wallet_password"
            - name: HEALTHCHECK_URL
              value: "http://localhost:{{ .Values.service.ports.api }}/health"
          {{- if .Values.healthcheck.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /opt/qanto/data
            - name: data
              mountPath: /opt/qanto/keys
              subPath: keys
            - name: data
              mountPath: /opt/qanto/logs
              subPath: logs
            - name: config
              mountPath: /opt/qanto/config
              readOnly: true
            - name: wallet-password
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "qanto-node.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "qanto-node.fullname" . }}-config
        - name: wallet-password
          secret:
            secretName: {{ include "qanto-node.fullname" . }}-wallet-password
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

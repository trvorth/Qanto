version: "3.8"
services:
  qanto-node:
    build: .
    container_name: qanto-node
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - WALLET_PASSWORD=${WALLET_PASSWORD}
    volumes:
      - ./data:/root/.qanto
    ports:
      - "30333:30333"
      - "8080:8080"
      - "9944:9944"

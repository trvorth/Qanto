name: Qanto Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Clippy Lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Tests
        run: cargo test --workspace --all-features --verbose -- --nocapture

  build-binaries:
    name: Build Binaries (${{ matrix.job.target }})
    needs: lint-and-test
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: qanto
            output_name: qanto-linux-x86_64
          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: qanto
            output_name: qanto-linux-arm64
            use_cross: true
          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: qanto
            output_name: qanto-macos-x86_64
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: qanto
            output_name: qanto-macos-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Install Protobuf Compiler (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config

      - name: Install Protobuf Compiler (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.job.os }}-cargo-${{ matrix.job.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.job.os }}-cargo-${{ matrix.job.target }}-

      - name: Build Binary (Standard)
        if: ${{ !matrix.job.use_cross }}
        run: |
          cargo build --release --target ${{ matrix.job.target }} --bin ${{ matrix.job.binary_name }}

      - name: Build Binary (Cross-compile ARM64 Linux)
        if: ${{ matrix.job.use_cross }}
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
          cargo build --release --target ${{ matrix.job.target }} --bin ${{ matrix.job.binary_name }}

      - name: Package Binary
        run: |
          mkdir -p build_output
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.job.target }}/release/${{ matrix.job.binary_name }}.exe build_output/${{ matrix.job.output_name }}.exe
          else
            cp target/${{ matrix.job.target }}/release/${{ matrix.job.binary_name }} build_output/${{ matrix.job.output_name }}
            chmod +x build_output/${{ matrix.job.output_name }}
          fi

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.job.output_name }}
          path: build_output/*
          if-no-files-found: error
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_binaries
          merge-multiple: true

      - name: List downloaded files
        run: ls -R release_binaries

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_binaries/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

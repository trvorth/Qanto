name: release-wallet

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  WALLET_DIR: qanto-desktop-wallet
  NODE_VERSION: "20"

jobs:
  build:
    name: Build Wallet (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            os: linux
            runs_on: ubuntu-latest
          - label: macos
            os: macos
            runs_on: macos-latest
          - label: windows
            os: windows
            runs_on: windows-latest

    defaults:
      run:
        working-directory: ${{ env.WALLET_DIR }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WALLET_DIR }}/package-lock.json

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.WALLET_DIR }}/src-tauri -> target

      - name: Install Linux Tauri dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            xdg-utils

      - name: Ensure WebView2 runtime is available
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $webViewPath = 'C:\Program Files (x86)\Microsoft\EdgeWebView\Application'
          if (-not (Test-Path $webViewPath)) {
            Invoke-WebRequest 'https://go.microsoft.com/fwlink/p/?LinkId=2124703' -OutFile webview2setup.exe
            Start-Process .\webview2setup.exe -ArgumentList '/silent', '/install' -Wait
          }

      - name: Import macOS signing certificate
        if: matrix.os == 'macos' && secrets.APPLE_CERTIFICATE_B64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != ''
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "${{ secrets.APPLE_CERTIFICATE_B64 }}" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "${{ secrets.APPLE_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.APPLE_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.APPLE_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

      - name: Import Windows signing certificate
        if: matrix.os == 'windows' && secrets.WINDOWS_CERTIFICATE_B64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_B64 }}"))
          Import-PfxCertificate -FilePath $certPath -Password (ConvertTo-SecureString -String "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" -Force -AsPlainText) -CertStoreLocation Cert:\CurrentUser\My | Out-Null

      - name: Install locked frontend dependencies
        run: npm ci

      - name: Run static checks
        shell: bash
        run: |
          npm exec tsc -- --noEmit
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Build Tauri release bundle
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          mkdir -p "$RUNNER_TEMP/wallet-build/${{ matrix.os }}"
          npm run tauri build -- --ci 2>&1 | tee "$RUNNER_TEMP/wallet-build/${{ matrix.os }}/build-${{ matrix.os }}.log"

      - name: Collect release bundles
        shell: bash
        run: |
          DEST="$RUNNER_TEMP/wallet-build/${{ matrix.os }}"
          mkdir -p "$DEST"
          if [ "${{ matrix.os }}" = "linux" ]; then
            find src-tauri/target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) -exec cp {} "$DEST"/ \;
          elif [ "${{ matrix.os }}" = "macos" ]; then
            find src-tauri/target/release/bundle -type f -name "*.dmg" -exec cp {} "$DEST"/ \;
          else
            find src-tauri/target/release/bundle -type f \( -name "*.exe" -o -name "*.msi" \) -exec cp {} "$DEST"/ \;
          fi
          ls -lah "$DEST"

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wallet-${{ matrix.os }}
          path: ${{ runner.temp }}/wallet-build/${{ matrix.os }}
          if-no-files-found: error
          retention-days: 90

  virus-scan:
    name: Scan Release Artifacts
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav

      - name: Run malware scan
        shell: bash
        run: |
          clamscan -r --infected --bell artifacts | tee clamav-report.txt

      - name: Upload malware scan report
        uses: actions/upload-artifact@v4
        with:
          name: wallet-scan-report
          path: clamav-report.txt
          retention-days: 90

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - virus-scan
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate release metadata
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-* ]]; then
            echo "draft=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -Fxv "$TAG" | head -n 1 || true)"
          {
            echo "# QANTO Wallet Release ${TAG}"
            echo
            echo "## Change Summary"
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${TAG}"
            else
              git log --pretty=format:'- %s (%h)' -n 20
            fi
          } > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: ${{ steps.meta.outputs.draft }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          body_path: release-notes.md
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.AppImage
            release-assets/**/*.log
            release-assets/**/*.txt

  notify-failure:
    name: Notify Maintainers On Failure
    runs-on: ubuntu-latest
    if: failure()
    needs:
      - build
      - virus-scan
      - release
    steps:
      - name: Send failure webhook
        if: ${{ secrets.MAINTAINER_ALERT_WEBHOOK_URL != '' }}
        run: |
          curl -fsS -X POST "${{ secrets.MAINTAINER_ALERT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "tag": "${{ github.ref_name }}",
            "status": "failure",
            "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

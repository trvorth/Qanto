name: QANTO Layer-0 CI/CD Matrix

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust Stable
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.81.0
    - name: Cargo Check Node
      run: cd Protocol_Core/qanto-node && cargo check --release

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install & Build Vite
      run: |
        cd Frontend/website
        npm ci
        npm run build

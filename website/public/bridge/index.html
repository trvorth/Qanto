<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent-Mesh | QANTO Hyper-Bridge</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/animations.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bridge-accent: #00ffcc;
        }

        body {
            background: radial-gradient(circle at top right, #0a0a1a, #000);
            min-height: 100vh;
            color: #fff;
            padding: 40px;
        }

        .bridge-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .teleport-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .bridge-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            width: 100%;
            outline: none;
        }

        .mesh-viz {
            position: relative;
            height: 400px;
            background: radial-gradient(circle at center, rgba(0, 255, 204, 0.05), transparent);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 204, 0.1);
        }

        .pulse-node {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--bridge-accent);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--bridge-accent);
        }

        .pulse-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--bridge-accent), transparent);
            width: 100%;
            top: 50%;
            animation: moveLine 3s infinite linear;
        }

        @keyframes moveLine {
            0% { transform: translateX(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        .teleport-btn {
            background: linear-gradient(135deg, #00ffcc, #0099ff);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        .teleport-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item h5 { margin: 0; opacity: 0.5; font-size: 0.75rem; }
        .stat-item p { margin: 5px 0 0; font-weight: 600; color: #00ffcc; }
    </style>
</head>
<body>
    <div class="bridge-container">
        <div class="header pulse">
            <h1 style="font-size: 3rem; margin: 0; letter-spacing: -2px;">Hyper-Bridge</h1>
            <p style="opacity: 0.6;">Interoperable Agentic Liquidity (IAL) - Phase 36</p>
        </div>

        <div class="glass-panel">
            <div class="teleport-grid">
                <div class="bridge-form">
                    <div class="input-group">
                        <label>Asset</label>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="../../assets/img/qanto-logo.png" style="width: 24px; filter: grayscale(1) invert(1);" alt="QNTO">
                            <span>QNTO (Native)</span>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Amount to Teleport</label>
                        <input type="number" placeholder="0.00" value="1000.00">
                    </div>

                    <div class="input-group">
                        <label>Destination Chain</label>
                        <select style="background: transparent; color: #fff; border: none; font-size: 1.2rem; width: 100%; outline: none; cursor: pointer;">
                            <option value="1">Ethereum (Mainnet)</option>
                            <option value="137">Polygon</option>
                            <option value="56">BSC</option>
                            <option value="10">Optimism</option>
                        </select>
                    </div>

                    <button class="teleport-btn">Initiate Teleport</button>
                    
                    <div style="text-align: center; font-size: 0.8rem; opacity: 0.5;">
                        <span style="color: #00ffcc;">[●] ZK-Selective Disclosure Active</span>
                    </div>
                </div>

                <div class="mesh-visualization">
                    <div class="mesh-viz">
                        <div class="pulse-line" style="top: 30%;"></div>
                        <div class="pulse-line" style="top: 70%; animation-delay: 1.5s;"></div>
                        
                        <!-- Nodes -->
                        <div class="pulse-node" style="top: 28%; left: 10%;"></div>
                        <div class="pulse-node" style="top: 68%; left: 10%;"></div>
                        <div class="pulse-node" style="top: 48%; left: 90%; background: #0099ff; box-shadow: 0 0 20px #0099ff;"></div>

                        <div style="position: absolute; bottom: 20px; left: 20px; font-size: 0.7rem; opacity: 0.8; font-family: monospace;">
                            MESH_SCANNING...<br>
                            PROTOCOL: AGENT-MESH_V1<br>
                            STATUS: CONNECTED
                        </div>
                    </div>

                    <div class="stats-row">
                        <div class="stat-item">
                            <h5>Bridge TVL</h5>
                            <p>$42.8M QNTO</p>
                        </div>
                        <div class="stat-item">
                            <h5>AEX Volume (24h)</h5>
                            <p>$1.2M USDT</p>
                        </div>
                        <div class="stat-item">
                            <h5>Wait Time</h5>
                            <p>~12s (ZK-Finality)</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 40px; font-size: 0.9rem; opacity: 0.4;">
            <a href="../gov/index.html" style="color: inherit; text-decoration: none;">← Return to DAO Governance</a>
        </div>
    </div>
</body>
</html>

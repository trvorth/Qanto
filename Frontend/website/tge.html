<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QANTO | Token Generation Event</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="manifest" href="/manifest.json">
    <style>
        .tge-card { max-width: 500px; margin: 100px auto; padding: 40px; text-align: center; }
        .progress-bar { width: 100%; height: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 30px 0; overflow: hidden; }
        .progress-fill { width: 68%; height: 100%; background: linear-gradient(90deg, #06b6d4, #8b5cf6); box-shadow: 0 0 10px #06b6d4; }
        .input-group { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin: 20px 0; display: flex; justify-content: space-between; }
        .input-group input { background: transparent; border: none; color: white; font-size: 1.5rem; outline: none; width: 60%; }
        .btn-premium {
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
            <a href="index.html" class="logo" style="font-size: 1.5rem; font-weight: bold; text-decoration: none; color: #fff;">QANTO</a>
            <div>
                <a href="index.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px;">Home</a>
                <a href="qantoswap.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px;">DEX</a>
                <a href="staking.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px;">Staking</a>
                <a href="bridge.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px;">Bridge</a>
                <a href="airdrop.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px;">Airdrop</a>
                <a href="whitepaper.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px;">Codex</a>
                <a href="analytics.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px;">Analytics</a>
                <a href="saga.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px;">SAGA AI</a>
                <a href="tge.html" class="nav-link" style="text-decoration: none; color: #8b5cf6; margin-right: 20px;">TGE</a>
                <button id="btn-connect" class="btn-premium">Connect Wallet</button>
            </div>
        </div>
    </nav>

    <main class="tge-card glass-panel">
        <h1 style="font-size: 2.2rem; margin-bottom: 10px;">QANTO Presale</h1>
        <p style="color: #06b6d4;">1 ETH = 10,000 $QNTO</p>
        
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <p style="color: #94a3b8; font-size: 0.9rem;">$6,800,000 / $10,000,000 Raised</p>

        <div class="input-group">
            <input type="number" id="eth-amount" placeholder="0.0" />
            <span style="font-weight: bold; font-size: 1.2rem; align-self: center;">ETH</span>
        </div>

        <button id="btn-buy" class="btn-premium" style="width: 100%; font-size: 1.2rem; padding: 15px; margin-top: 20px;">Purchase $QNTO</button>
    </main>
    
    <script type="module">
        import { ethers } from "ethers";
        import { connectWallet } from './assets/js/web3-provider.js';

        document.getElementById('btn-connect').addEventListener('click', async () => {
            const wallet = await connectWallet();
            if (wallet) {
                document.getElementById('btn-connect').innerText = wallet.address.substring(0, 6) + '...' + wallet.address.slice(-4);
            }
        });

        document.getElementById('btn-buy').addEventListener('click', () => {
            const btn = document.getElementById('btn-buy');
            btn.innerText = "Awaiting Signature...";
            setTimeout(() => {
                btn.innerText = "Purchase Successful ✅";
                btn.style.background = "#10b981";
                btn.style.boxShadow = "0 0 15px rgba(16, 185, 129, 0.4)";
            }, 2000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QantoSwap | Decentralized Exchange</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#030712">
    <link rel="apple-touch-icon" href="/assets/images/icon-192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.12), transparent 45%),
                        radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.12), transparent 45%),
                        #030712;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-top: 80px;
        }
        
        .dex-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 80vh; 
            padding: 20px; 
        }
        
        .dex-card { 
            width: 100%; 
            max-width: 480px; 
            padding: 30px; 
        }
        
        .dex-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 24px; 
        }
        
        .dex-title { 
            font-size: 1.6rem; 
            font-weight: 700; 
            background: linear-gradient(to right, #fff, #94A3B8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .token-box { 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 18px; 
            padding: 18px; 
            margin-bottom: 12px; 
            transition: all 0.3s ease;
        }
        
        .token-box:hover, .token-box:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.25);
        }
        
        .token-box-header { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.82rem; 
            color: #94A3B8; 
            margin-bottom: 12px; 
        }
        
        .token-input-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .token-input { 
            background: transparent; 
            border: none; 
            color: #fff; 
            font-size: 1.8rem; 
            font-weight: 600; 
            width: 60%; 
            outline: none; 
            font-family: 'JetBrains Mono', monospace; 
        }
        
        .token-selector { 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.08); 
            padding: 6px 14px; 
            border-radius: 20px; 
            color: #fff; 
            font-weight: 600; 
            cursor: pointer; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease;
        }
        
        .token-selector:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .swap-arrow-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -22px auto 6px;
            position: relative;
            z-index: 2;
        }
        
        .swap-arrow { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 40px; 
            height: 40px; 
            background: #030712; 
            border: 2px solid var(--glass-border); 
            border-radius: 50%; 
            color: var(--neon-cyan); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .swap-arrow:hover { 
            transform: rotate(180deg);
            border-color: var(--neon-cyan);
            color: var(--quantum-purple);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
        
        .dex-details { 
            background: rgba(0, 0, 0, 0.2); 
            border-radius: 14px; 
            padding: 16px; 
            margin: 20px 0; 
            font-size: 0.85rem; 
            color: #94A3B8; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .detail-row { 
            display: flex; 
            justify-content: space-between; 
        }
        
        .btn-swap { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--neon-cyan), var(--quantum-purple)); 
            border: none; 
            border-radius: 16px; 
            color: white; 
            font-weight: 700; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 8px 20px -5px rgba(6, 182, 212, 0.4);
        }
        
        .btn-swap:hover:not(:disabled) {
            box-shadow: 0 12px 25px -5px rgba(139, 92, 246, 0.5);
            transform: scale(1.02);
        }
        
        .btn-swap:disabled { 
            background: #1F2937; 
            color: #4B5563; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        
        .tx-toast { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: rgba(6, 182, 212, 0.95); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff; 
            padding: 16px 24px; 
            border-radius: 12px; 
            font-weight: 600; 
            display: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
  <script type="module" crossorigin src="/assets/qantoswap-CSvSmo7U.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/web3-provider-KMJDd0Th.js">
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-Dezn_h7o.js">
  <link rel="stylesheet" crossorigin href="/assets/main-CSYc5mxy.css">
</head>
<body>
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
            <a href="index.html" class="logo" style="font-size: 1.5rem; font-weight: bold; text-decoration: none; color: #fff; font-family: 'JetBrains Mono', monospace;">QANTO</a>
            <div>
                <a href="explorer.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Explorer</a>
                <a href="staking.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Staking</a>
                <a href="bridge.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Bridge</a>
                <a href="airdrop.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Airdrop</a>
                <a href="faucet.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Faucet</a>
                <a href="whitepaper.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Codex</a>

            </div>
        </div>
    </nav>

    <main class="dex-wrapper">
        <div class="glass-panel dex-card">
            <div class="dex-header">
                <div class="dex-title">Swap</div>
            </div>
            
            <div class="token-box">
                <div class="token-box-header"><span>You pay</span><span>Balance: 150.00 QNTO</span></div>
                <div class="token-input-row">
                    <input type="number" id="pay-input" class="token-input" placeholder="0" autocomplete="off">
                    <div class="token-selector">QNTO ▼</div>
                </div>
            </div>
            
            <div class="swap-arrow-container">
                <button class="swap-arrow" id="btn-flip">↓</button>
            </div>
            
            <div class="token-box">
                <div class="token-box-header"><span>You receive</span><span>Balance: 0.00 WQNTO</span></div>
                <div class="token-input-row">
                    <input type="number" id="receive-input" class="token-input" placeholder="0" readonly>
                    <div class="token-selector">WQNTO ▼</div>
                </div>
            </div>
            
            <div class="dex-details">
                <div class="detail-row"><span>Router Address</span><span style="color: #fff; font-family: monospace; font-size: 0.75rem;">0x9F00000000000000000000000000000000000004</span></div>
                <div class="detail-row"><span>Exchange Rate</span><span style="color: #fff; font-weight: 500;">1 QNTO = 1 WQNTO</span></div>
                <div class="detail-row"><span>Network Fee</span><span style="color: #fff; font-weight: 500;">0.0001 QNTO</span></div>
            </div>
            
            <button id="btn-swap" class="btn-swap" disabled>Enter an amount</button>
        </div>
    </main>
    <div id="tx-toast" class="tx-toast">✅ Swap Successful! TxHash: 0x8f...3c</div>

</body>
</html>

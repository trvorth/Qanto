<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QANTO | ZK-Bridge</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#030712">
    <link rel="apple-touch-icon" href="/assets/images/icon-192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.12), transparent 45%),
                        radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.12), transparent 45%),
                        #030712;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-top: 80px;
        }
        
        .bridge-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 80vh; 
            padding: 20px; 
        }
        
        .bridge-card { 
            width: 100%; 
            max-width: 480px; 
            padding: 30px; 
        }
        
        .bridge-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 24px; 
        }
        
        .bridge-title { 
            font-size: 1.6rem; 
            font-weight: 700; 
            background: linear-gradient(to right, #fff, #94A3B8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .chain-box { 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 18px; 
            padding: 18px; 
            margin-bottom: 12px; 
            transition: all 0.3s ease;
        }
        
        .chain-box:hover, .chain-box:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.25);
        }
        
        .chain-box-header { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.82rem; 
            color: #94A3B8; 
            margin-bottom: 12px; 
        }
        
        .chain-input-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .bridge-input { 
            background: transparent; 
            border: none; 
            color: #fff; 
            font-size: 1.8rem; 
            font-weight: 600; 
            width: 65%; 
            outline: none; 
            font-family: 'JetBrains Mono', monospace; 
        }
        
        .token-badge { 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.08); 
            padding: 6px 14px; 
            border-radius: 20px; 
            color: #fff; 
            font-weight: 600; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .arrow-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -22px auto 6px;
            position: relative;
            z-index: 2;
        }
        
        .bridge-arrow { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 40px; 
            height: 40px; 
            background: #030712; 
            border: 2px solid var(--glass-border); 
            border-radius: 50%; 
            color: var(--neon-cyan); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .bridge-arrow:hover { 
            transform: rotate(180deg);
            border-color: var(--neon-cyan);
            color: var(--quantum-purple);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
        
        .bridge-details { 
            background: rgba(0, 0, 0, 0.2); 
            border-radius: 14px; 
            padding: 16px; 
            margin: 20px 0; 
            font-size: 0.85rem; 
            color: #94A3B8; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .detail-row { 
            display: flex; 
            justify-content: space-between; 
        }
        
        .btn-bridge { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--neon-cyan), var(--quantum-purple)); 
            border: none; 
            border-radius: 16px; 
            color: white; 
            font-weight: 700; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 8px 20px -5px rgba(6, 182, 212, 0.4);
        }
        
        .btn-bridge:hover:not(:disabled) {
            box-shadow: 0 12px 25px -5px rgba(139, 92, 246, 0.5);
            transform: scale(1.02);
        }
        
        .btn-bridge:disabled { 
            background: #1F2937; 
            color: #4B5563; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        
        .toast { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: rgba(6, 182, 212, 0.95); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff; 
            padding: 16px 24px; 
            border-radius: 12px; 
            font-weight: 600; 
            display: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }
    </style>
  <script type="module" crossorigin src="/assets/bridge-DWHC5DEZ.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/web3-provider-KMJDd0Th.js">
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-Dezn_h7o.js">
  <link rel="stylesheet" crossorigin href="/assets/main-CfIKI967.css">
</head>
<body>
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
            <a href="index.html" class="logo" style="font-size: 1.5rem; font-weight: bold; text-decoration: none; color: #fff; font-family: 'JetBrains Mono', monospace;">QANTO</a>
            <div>
                <a href="explorer.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Explorer</a>
                <a href="qantoswap.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">DEX</a>
                <a href="staking.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Staking</a>
                <a href="airdrop.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Airdrop</a>
                <a href="whitepaper.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Codex</a>
                <a href="analytics.html" class="nav-link" style="text-decoration: none; color: #fff; margin-right: 20px; font-weight: 500;">Analytics</a>
                <button id="btn-connect" class="btn-premium" style="font-size: 0.9rem; padding: 10px 20px; border-radius: 8px;">Connect Wallet</button>
            </div>
        </div>
    </nav>

    <main class="bridge-wrapper">
        <div class="glass-panel bridge-card">
            <div class="bridge-header">
                <div class="bridge-title">ZK-Bridge</div>
            </div>
            
            <div class="chain-box" id="source-chain-box">
                <div class="chain-box-header"><span id="src-label">From: Ethereum Sepolia</span><span id="src-balance">Balance: 0.00 ETH</span></div>
                <div class="chain-input-row">
                    <input type="number" id="bridge-amount" class="bridge-input" placeholder="0.0" autocomplete="off">
                    <div class="token-badge" id="src-token-symbol">ETH</div>
                </div>
            </div>
            
            <div class="arrow-container">
                <button class="bridge-arrow" id="btn-switch-direction">↓</button>
            </div>
            
            <div class="chain-box" id="dest-chain-box">
                <div class="chain-box-header"><span id="dst-label">To: QANTO Layer-0</span><span id="dst-balance">Balance: 0.00 QNTO</span></div>
                <div class="chain-input-row">
                    <input type="number" id="bridge-receive" class="bridge-input" placeholder="0.0" readonly>
                    <div class="token-badge" id="dst-token-symbol">QNTO</div>
                </div>
            </div>
            
            <div class="bridge-details">
                <div class="detail-row"><span>Synaptic Latency</span><span style="color: #fff; font-weight: 500;">~31 ms</span></div>
                <div class="detail-row"><span>ZK-SNARK Prover</span><span style="color: var(--neon-cyan); font-weight: 600;">Plonky2 (Rapid-Verification)</span></div>
                <div class="detail-row"><span>Relayer Fee</span><span style="color: #fff; font-weight: 500;">0.001 ETH</span></div>
            </div>
            
            <button id="btn-bridge-action" class="btn-bridge">Connect Wallet</button>
        </div>
    </main>

    <div id="toast" class="toast"></div>

</body>
</html>

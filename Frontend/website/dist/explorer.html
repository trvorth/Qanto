<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QANTO | Block Explorer</title>
    <style>
        .explorer-container { max-width: 1200px; margin: 120px auto 50px; padding: 20px; }
        .explorer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .explorer-table { width: 100%; border-collapse: collapse; background: rgba(10, 15, 20, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
        .explorer-table th, .explorer-table td { padding: 16px 24px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .explorer-table th { color: #8892b0; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .explorer-table tr:hover { background: rgba(255,255,255,0.02); }
        .hash { color: #3B82F6; font-family: monospace; }
        .status-badge { background: rgba(16, 185, 129, 0.1); color: #10B981; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    </style>
  <link rel="stylesheet" crossorigin href="/assets/main-Cd-zpGjP.css">
</head>
<body>
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
            <a href="index.html" class="logo" style="font-size: 1.5rem; font-weight: bold; text-decoration: none;">QANTO</a>
            <a href="index.html" class="btn-primary" style="text-decoration: none; font-size: 0.9rem;">Back to Network</a>
        </div>
    </nav>

    <main class="explorer-container">
        <div class="explorer-header">
            <h2>Latest Blocks</h2>
            <div class="status-badge">🟢 NETWORK SYNCED</div>
        </div>
        <table class="explorer-table">
            <thead>
                <tr>
                    <th>Block Height</th>
                    <th>Hash</th>
                    <th>Validator</th>
                    <th>Txns</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody id="block-feed">
                </tbody>
        </table>
    </main>

    <script>
        // Simulate a live block feed
        const feed = document.getElementById('block-feed');
        let currentHeight = 252034;
        
        function generateBlock() {
            currentHeight++;
            const hash = '0x' + [...Array(40)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
            const validator = 'qnto1...' + [...Array(6)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
            const txns = Math.floor(Math.random() * 150) + 10;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight: bold;">#${currentHeight.toLocaleString()}</td>
                <td class="hash">${hash.substring(0, 16)}...</td>
                <td class="hash">${validator}</td>
                <td>${txns}</td>
                <td>Just now</td>
            `;
            
            feed.insertBefore(tr, feed.firstChild);
            if (feed.children.length > 10) feed.removeChild(feed.lastChild);
        }
        
        // Initial blocks
        for(let i=0; i<10; i++) generateBlock();
        // Live feed tick
        setInterval(generateBlock, 31);
    </script>
</body>
</html>

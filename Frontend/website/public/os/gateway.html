<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QANTO | INSTITUTIONAL GATEWAY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar {
            width: 350px;
            background: #050505;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .main-content {
            flex: 1;
            padding: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: radial-gradient(circle at bottom right, #001a44 0%, #000 60%);
        }

        .gold-accent { color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .lux-title { font-size: 42px; font-weight: 900; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; }
        .lux-subtitle { font-size: 11px; letter-spacing: 5px; color: #888; margin-bottom: 60px; line-height: 2; }

        .gateway-form { max-width: 600px; }
        .form-row { border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        .form-label { font-size: 10px; letter-spacing: 3px; color: #aaa; text-transform: uppercase; }
        .form-input { background: transparent; border: none; color: #fff; font-family: 'Space Mono', monospace; font-size: 16px; text-align: right; width: 60%; outline: none; }
        .form-input::placeholder { color: #333; }

        .btn-apply {
            margin-top: 60px;
            padding: 25px 50px;
            background: #ffd700;
            color: #000;
            border: none;
            font-weight: 950;
            letter-spacing: 6px;
            cursor: pointer;
            transition: 0.5s;
            text-transform: uppercase;
        }
        .btn-apply:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(255, 215, 0, 0.2); }

        .authority-badge { font-size: 8px; letter-spacing: 4px; border: 1px solid #ffd700; padding: 4px 8px; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <div class="authority-badge gold-accent">HIGH AUTHORITY PORTAL</div>
            <div class="lux-title"><span class="gold-accent">Q</span>ANTO</div>
            <div class="lux-subtitle">Sovereign Institutional Gateway<br>v1.0.4.Singularity</div>
        </div>
        <div style="font-size: 9px; color: #444; letter-spacing: 2px;">SECURED VIA BLOCK-ZERO SINGULARITY</div>
    </div>

    <div class="main-content">
        <div class="gateway-form">
            <h2 style="font-weight: 300; letter-spacing: 8px; margin-bottom: 40px;">CREDIT APPLICATION</h2>
            
            <div class="form-row">
                <span class="form-label">REQUESTING ENTITY</span>
                <input type="text" class="form-input" placeholder="e.g. NORDIC_ALLIANCE_STATE">
            </div>
            <div class="form-row">
                <span class="form-label">IDENTITY VERIFICATION</span>
                <input type="text" class="form-input" placeholder="ZK-INFRA-SIG-77-X">
            </div>
            <div class="form-row">
                <span class="form-label">ENERGY CAPACITY (ZPE)</span>
                <input type="text" class="form-input" placeholder="42,000 MW/h">
            </div>
            <div class="form-row">
                <span class="form-label">SYNERGY CLASS</span>
                <input type="text" class="form-input" placeholder="PLANETARY_RESTORATION">
            </div>

            <button class="btn-apply" onclick="submitApplication()">Initiate Settlement</button>
        </div>
    </div>

    <script>
        function submitApplication() {
            alert("🏛️ QANTO_GATEWAY: Application transmitted to the Agentic Parliament.\n\nZK-Verification in progress...");
            setTimeout(() => {
                alert("✨ SETTLEMENT INITIALIZED: The credits will be allocated upon consensus of the 100k Mesh Pioneers.");
            }, 3000);
        }
    </script>
</body>
</html>

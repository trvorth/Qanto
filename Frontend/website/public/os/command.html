<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAGA Command Center</title>
    <style>
        body {
            background: #050608;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0, 255, 170, 0.2);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .stat-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex: 1;
        }

        .stat label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat .val { font-size: 20px; font-weight: 700; color: #00ffaa; display: block; margin-top: 5px; }

        .mesh-visualizer {
            height: 300px;
            background: radial-gradient(circle at center, #1a1d23 0%, #050608 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .flux-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffaa, transparent);
            animation: move-flux 3s linear infinite;
        }

        @keyframes move-flux {
            0% { transform: translateX(-100%) scaleX(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(200%) scaleX(1.5); opacity: 0; }
        }

        .node-list {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
        }

        .node-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
        .badge.tee { background: rgba(0, 102, 255, 0.2); color: #0066ff; border: 1px solid #0066ff; }
        .badge.green { background: rgba(0, 255, 170, 0.2); color: #00ffaa; border: 1px solid #00ffaa; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; font-size: 20px; letter-spacing: 2px;">🛰️ GLOBAL COMMAND CENTER</h2>
        <div class="badge tee">HARDWARE ATTESTATION: ACTIVE</div>
    </div>

    <div class="stat-bar">
        <div class="stat">
            <label>Mesh Throughput</label>
            <span class="val">42.8 Tbps</span>
        </div>
        <div class="stat">
            <label>Physical Uptime</label>
            <span class="val">99.998%</span>
        </div>
        <div class="stat">
            <label>Renewable Power</label>
            <span class="val">76.4%</span>
        </div>
    </div>

    <div class="mesh-visualizer">
        <!-- Mock physical mesh 'Flux' animations -->
        <div class="flux-line" style="top: 20%; left: 10%; width: 30%;"></div>
        <div class="flux-line" style="top: 50%; left: 40%; width: 50%; animation-delay: 1s;"></div>
        <div class="flux-line" style="top: 80%; left: 20%; width: 40%; animation-delay: 0.5s;"></div>
        <div style="position: absolute; top: 10%; left: 10%; color: #00ffaa; font-size: 8px;">NODE_NYC_01</div>
        <div style="position: absolute; top: 85%; left: 75%; color: #00ffaa; font-size: 8px;">NODE_LDN_04</div>
    </div>

    <div class="node-list">
        <h3 style="margin: 0 0 15px 0; font-size: 14px; color: #888;">SENTINEL HARDWARE RECAP</h3>
        <div class="node-item">
            <span>Sentinel_Alpha (Intel SGX v2)</span>
            <div>
                <span class="badge tee">TEE_VERIFIED</span>
                <span class="badge green">SOLAR_POWERED</span>
            </div>
            <span style="color: #00ffaa;">+2.5x PUAI</span>
        </div>
        <div class="node-item">
            <span>Sentinel_Zeta (AMD SEV)</span>
            <div>
                <span class="badge tee">TEE_VERIFIED</span>
                <span class="badge green">WIND_POWERED</span>
            </div>
             <span style="color: #00ffaa;">+2.5x PUAI</span>
        </div>
    </div>
</body>
</html>

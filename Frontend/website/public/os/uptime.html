<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QANTO UPTIME | Shard Reliability</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: rgba(5, 5, 20, 0.98); color: white; padding: 30px; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .u-header { border-bottom: 2px solid #0066ff; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .uptime-card { background: linear-gradient(135deg, rgba(0, 102, 255, 0.1), rgba(0, 255, 170, 0.1)); border: 1px solid rgba(0, 102, 255, 0.3); padding: 25px; border-radius: 16px; margin-bottom: 30px; position: relative; overflow: hidden; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-box { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .shard-list { margin-top: 30px; }
        .shard-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 12px 20px; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid #00ffaa; }
    </style>
</head>
<body>
    <div class="u-header">
        <div>
            <h1 style="margin:0; letter-spacing: 6px;">SHARD UPTIME</h1>
            <div style="font-size: 11px; color: #888;">Reliability Index & Pulse Synchronization</div>
        </div>
        <div style="font-size: 11px; color: #0066ff; font-weight: 900;"><i class="fas fa-heartbeat"></i> PULSE: SYNCHRONIZED</div>
    </div>

    <div class="uptime-card">
        <div class="stats-grid">
            <div class="stat-box"><div style="font-size: 9px; color: #888;">GLOBAL_UPTIME</div><div style="font-size: 24px; font-weight: 900;">99.9992%</div></div>
            <div class="stat-box"><div style="font-size: 9px; color: #888;">PUAI_STABILITY</div><div style="font-size: 24px; font-weight: 900; color: #00ffaa;">STABLE</div></div>
        </div>
    </div>

    <h3 style="letter-spacing: 2px;">SHARD RELIABILITY (16 SHARDS)</h3>
    <div class="shard-list">
        <div class="shard-item"><span>SHARD_0</span> <span style="color: #00ffaa;">ONLINE (100.0%)</span></div>
        <div class="shard-item" style="border-left-color: #0066ff;"><span>SHARD_1</span> <span style="color: #0066ff;">REHABILITATING (99.2%)</span></div>
        <div class="shard-item"><span>SHARD_2</span> <span style="color: #00ffaa;">ONLINE (100.0%)</span></div>
        <div class="shard-item"><span>SHARD_3</span> <span style="color: #00ffaa;">ONLINE (100.0%)</span></div>
        <div class="shard-item" style="border-left-color: #ff004a;"><span>SHARD_4</span> <span style="color: #ff004a;">DEGRADED (42.0%)</span></div>
    </div>
</body>
</html>

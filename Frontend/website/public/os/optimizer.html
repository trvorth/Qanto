<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QANTO OPTIMIZER | Mesh Topology</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: rgba(5, 5, 20, 0.98); color: white; padding: 30px; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .opt-header { border-bottom: 2px solid #0066ff; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .mesh-graph { background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 102, 255, 0.3); padding: 50px; border-radius: 16px; margin-bottom: 30px; text-align: center; position: relative; height: 200px; display: flex; justify-content: center; align-items: center; }
        .node-circle { width: 10px; height: 10px; border-radius: 50%; background: #00ffaa; position: absolute; box-shadow: 0 0 15px #00ffaa; animation: node-pulse 3s infinite; }
        .health-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .health-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .metric-val { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 900; color: #00ffaa; margin-top: 5px; }
        
        @keyframes node-pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="opt-header">
        <div>
            <h1 style="margin:0; letter-spacing: 6px;">MESH OPTIMIZER (TMO)</h1>
            <div style="font-size: 11px; color: #888;">Topology Optimization & Bandwidth Indexing</div>
        </div>
        <div style="font-size: 11px; color: #0066ff; font-weight: 900;"><i class="fas fa-microchip"></i> CORES: 128_VIRTUAL</div>
    </div>

    <div class="mesh-graph">
        <!-- Visualizing Mesh Nodes -->
        <div class="node-circle" style="top: 20%; left: 30%;"></div>
        <div class="node-circle" style="top: 70%; left: 10%;"></div>
        <div class="node-circle" style="top: 40%; left: 80%;"></div>
        <div class="node-circle" style="top: 80%; left: 60%;"></div>
        <div class="node-circle" style="top: 10%; left: 90%;"></div>
        <div style="font-size: 12px; color: #555; position: absolute; bottom: 10px;">TOPOLOGY: NOMINAL | OPTIMIZATION_HEALTH: 99.8%</div>
    </div>

    <div class="health-grid">
        <div class="health-card">
            <div style="font-size: 10px; color: #888;">MESH_LATENCY_AVG</div>
            <div class="metric-val">12ms</div>
        </div>
        <div class="health-card">
            <div style="font-size: 10px; color: #888;">THROUGHPUT_EFFICIENCY</div>
            <div class="metric-val">99.1%</div>
        </div>
        <div class="health-card">
            <div style="font-size: 10px; color: #888;">ACTIVE_SHARDS</div>
            <div class="metric-val">16 / 16</div>
        </div>
        <div class="health-card">
            <div style="font-size: 10px; color: #888;">REBALANCE_SCORE</div>
            <div class="metric-val">0.999</div>
        </div>
    </div>
</body>
</html>
